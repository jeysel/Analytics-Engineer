# ─────────────────────────────────────────────────────────────────────────────
# Compras Públicas — CI/CD Pipeline
#
# Trigger: push na branch main
# Fluxo:
#   1. Sobe PostgreSQL
#   2. Inicializa schemas + dim_datas
#   3. Roda dbt seed (carrega CSVs)
#   4. Roda dbt build (transforma + testa)
#   5. Builda Evidence (gera site estático)
#   6. Publica no GitHub Pages
# ─────────────────────────────────────────────────────────────────────────────

name: Pipeline Compras Públicas

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB:       compras_publicas
          POSTGRES_USER:     cp_user
          POSTGRES_PASSWORD: cp_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ── Checkout PRIMEIRO ─────────────────────────────────────────────────
      - name: Checkout repositório
        uses: actions/checkout@v4

      # ── Inicializa schemas no PostgreSQL ──────────────────────────────────
      - name: Inicializa schemas
        env:
          PGPASSWORD: cp_pass
        run: |
          psql -h localhost -U cp_user -d compras_publicas \
            -f postgres/init/01_init.sql

      # ── DBT ───────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala dbt-core + dbt-postgres
        run: pip install dbt-core==1.9.* dbt-postgres==1.9.*

      - name: dbt deps
        working-directory: dbt
        run: dbt deps
        env:
          DBT_PROFILES_DIR: .
          POSTGRES_HOST:     localhost
          POSTGRES_PORT:     "5432"
          POSTGRES_DB:       compras_publicas
          POSTGRES_USER:     cp_user
          POSTGRES_PASSWORD: cp_pass

      - name: dbt seed
        working-directory: dbt
        run: dbt seed
        env:
          DBT_PROFILES_DIR: .
          POSTGRES_HOST:     localhost
          POSTGRES_PORT:     "5432"
          POSTGRES_DB:       compras_publicas
          POSTGRES_USER:     cp_user
          POSTGRES_PASSWORD: cp_pass

      - name: dbt build
        working-directory: dbt
        run: dbt build
        env:
          DBT_PROFILES_DIR: .
          POSTGRES_HOST:     localhost
          POSTGRES_PORT:     "5432"
          POSTGRES_DB:       compras_publicas
          POSTGRES_USER:     cp_user
          POSTGRES_PASSWORD: cp_pass

      # ── Evidence ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instala dependências Evidence
        working-directory: evidence
        run: npm install

      - name: Sources Evidence
        working-directory: evidence
        run: npm run sources
        env:
          POSTGRES_HOST:      localhost
          POSTGRES_PORT:      "5432"
          POSTGRES_DATABASE:  compras_publicas
          POSTGRES_USER:      cp_user
          POSTGRES_PASSWORD:  cp_pass
          POSTGRES_SCHEMA:    marts

      - name: Build Evidence (site estático)
        working-directory: evidence
        run: npm run build
        env:
          POSTGRES_HOST:      localhost
          POSTGRES_PORT:      "5432"
          POSTGRES_DATABASE:  compras_publicas
          POSTGRES_USER:      cp_user
          POSTGRES_PASSWORD:  cp_pass
          POSTGRES_SCHEMA:    marts

      # ── GitHub Pages ──────────────────────────────────────────────────────
      - name: Publica no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./evidence/.evidence/template/static