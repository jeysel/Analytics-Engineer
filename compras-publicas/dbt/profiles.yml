# ─────────────────────────────────────────────────────────────────────────────
# DBT Profiles — Compras Públicas
# Credenciais injetadas via variáveis de ambiente
# ─────────────────────────────────────────────────────────────────────────────

compras_publicas:
  target: dev
  outputs:
    dev:
      type: postgres
      host:     "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port:     "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname:   "{{ env_var('POSTGRES_DB', 'compras_publicas') }}"
      user:     "{{ env_var('POSTGRES_USER', 'cp_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'cp_pass') }}"
      schema:   raw
      threads:  4