version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Compras Públicas — Pipeline Analytics
#
# Serviços:
#   postgres  → banco de dados (Ubuntu 24.04 + PostgreSQL 17)
#   dbt       → transformações (staging → intermediate → marts)
#   evidence  → dashboards estáticos (GitHub Pages)
#
# Rede: todos os serviços compartilham a rede "compras_network"
#
# Uso:
#   docker compose up postgres -d                      # sobe o banco
#   docker compose run --rm dbt dbt seed               # carrega CSVs
#   docker compose run --rm dbt dbt build              # transforma + testa
#   docker compose --profile evidence up evidence -d   # sobe o dashboard
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 17 ────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: compras_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-compras_publicas}
      POSTGRES_USER:     ${POSTGRES_USER:-cp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cp_pass}
      TZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/17/main
      - pglog:/var/log/postgresql
    networks:
      - compras_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-compras_publicas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DBT Core ─────────────────────────────────────────────────────────────
  dbt:
    build:
      context: ./dbt
      dockerfile: Dockerfile
    container_name: compras_dbt
    env_file: .env
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     ${POSTGRES_PORT:-5432}
      POSTGRES_DB:       ${POSTGRES_DB:-compras_publicas}
      POSTGRES_USER:     ${POSTGRES_USER:-cp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cp_pass}
    volumes:
      - ./dbt:/usr/app/dbt
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - compras_network
    profiles: ["dbt"]

  # ── Evidence ─────────────────────────────────────────────────────────────
  evidence:
    build:
      context: ./evidence
      dockerfile: Dockerfile
    container_name: compras_evidence
    env_file: .env
    environment:
      EVIDENCE_DATABASE: postgres
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     ${POSTGRES_PORT:-5432}
      POSTGRES_DB:       ${POSTGRES_DB:-compras_publicas}
      POSTGRES_USER:     ${POSTGRES_USER:-cp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cp_pass}
      POSTGRES_SCHEMA:   marts
    ports:
      - "3000:3000"
    volumes:
      - ./evidence:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - compras_network
    profiles: ["evidence"]

# ── Rede compartilhada ───────────────────────────────────────────────────────
networks:
  compras_network:
    driver: bridge

# ── Volumes persistentes ─────────────────────────────────────────────────────
volumes:
  pgdata:
  pglog: